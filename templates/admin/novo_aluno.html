{% extends "admin/base_admin.html" %}
{% block title %}Novo Aluno — EBD Digital{% endblock %}
{% block page_title %}Cadastrar Aluno{% endblock %}

{% block header_actions %}
<a href="{{ url_for('admin.alunos') }}" class="btn btn-ghost">← Voltar</a>
{% endblock %}

{% block admin_content %}
<div class="card card-form">
  <div class="card-body">
    <form method="POST" class="form-grid">
      <div class="form-group">
        <label>Nome Completo *</label>
        <input type="text" name="nome" required placeholder="Ex: João da Silva">
      </div>

      <div class="form-group">
        <label>Telefone (WhatsApp)</label>
        <input type="text" name="telefone" placeholder="(xx) xxxxx-xxxx">
      </div>

      <div class="form-group">
        <label>Data de Nascimento</label>
        <input type="date" name="data_nascimento">
      </div>

      <div class="form-group">
        <label>Sexo</label>
        <select name="sexo">
          <option value="">Selecionar...</option>
          <option value="Masculino">Masculino</option>
          <option value="Feminino">Feminino</option>
        </select>
      </div>

      <div class="form-group">
        <label>Igreja / Congregação</label>
        <input type="text" name="igreja" placeholder="Ex: Igreja Central">
      </div>

      <div class="form-group">
        <label>Classe</label>
        <select name="classe">
          <option value="">Selecionar...</option>
          <option value="Crianças">Crianças</option>
          <option value="Adolescentes">Adolescentes</option>
          <option value="Jovens">Jovens</option>
          <option value="Adultos">Adultos</option>
          <option value="Terceira Idade">Terceira Idade</option>
          <option value="Outra">Outra</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Cadastrar Aluno</button>
        <a href="{{ url_for('admin.alunos') }}" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
